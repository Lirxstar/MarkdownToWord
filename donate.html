<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>请我喝杯咖啡 / Buy Me a Coffee</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page-title="meta.donateTitle">
  <main class="app-shell donate-shell">
    <header class="top-bar">
      <a class="brand-link" href="index.html" data-i18n="nav.home">转换工具</a>
      <div class="top-actions">
        <a class="coffee-link" href="donate.html" data-i18n="nav.donate">请我喝杯咖啡</a>
        <button class="language-btn" type="button" data-language-toggle data-i18n="nav.language">English</button>
      </div>
    </header>

    <section class="hero donate-hero">
      <p class="eyebrow" data-i18n="donate.eyebrow">Support</p>
      <h1 data-i18n="donate.title">请我喝杯咖啡</h1>
      <p class="subtitle" data-i18n="donate.subtitle">如果这个工具对你有帮助，可以通过支付宝或微信打赏支持。</p>
    </section>

    <section class="donate-grid">
      <article class="panel qr-card">
        <h2 data-i18n="donate.alipay">支付宝</h2>
        <img src="assets/alipay-qr.png" alt="Alipay QR code" />
        <p data-i18n="donate.scan">用对应 App 扫码打赏。</p>
      </article>

      <article class="panel qr-card">
        <h2 data-i18n="donate.wechat">微信</h2>
        <img src="assets/wechat-qr.png" alt="WeChat Pay QR code" />
        <p data-i18n="donate.scan">用对应 App 扫码打赏。</p>
      </article>
    </section>

    <section class="note panel donate-actions-panel">
      <p class="donate-back"><a href="index.html" data-i18n="donate.back">返回转换工具</a></p>
    </section>
  </main>

  <script src="i18n.js"></script>
</body>
</html>
